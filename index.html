<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>رسالة تذكير - محمد يا شريف اتقي ربنا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e2c3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .message {
            font-size: 2.4rem;
            font-weight: 800;
            color: #b23c1c;
            background: linear-gradient(135deg, #9e2a2a, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 25px;
            line-height: 1.4;
            letter-spacing: -0.5px;
            word-break: keep-all;
        }

        .highlight {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #c0392b, #f39c12);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .sub {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #2c3e50;
            background: #ecf0f1;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
        }

        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        @media (max-width: 550px) {
            .message {
                font-size: 1.8rem;
            }
            .highlight {
                font-size: 2rem;
            }
            .card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🕌</div>
    <div class="message">
        <span class="highlight">محمد يا شريف</span><br>
        اتقي ربنا
    </div>
    <div class="sub">
        ﴿ وَاتَّقُوا اللَّهَ ۖ وَاعْلَمُوا أَنَّكُمْ مُلَاقُوهُ ﴾
    </div>
    <div class="footer">
        تذكرة ونصيحة لله | اللهم بلغت اللهم فاشهد
    </div>
</div>

</body>
</html>
